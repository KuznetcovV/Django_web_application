{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Ученики</h2>

    <a class="btn btn-primary" href="{% url 'add_student' %}">
        + Добавить ученика
    </a>
</div>

{% if students %}
    <div class="row">
        {% for student in students %}
            <div class="col-md-6 col-lg-4">
                <div class="card mb-3 shadow-sm border-0 h-100">
                    <div class="card-body d-flex flex-column justify-content-between">

                        <div>
                            <h5 class="card-title">
                                <a href="{% url 'student_info' student.id %}" class="text-decoration-none text-dark">
                                    {{ student.name }}
                                </a>
                            </h5>

                            <span class="badge bg-secondary">
                                {{ student.get_number_of_class_display }}
                            </span>
                        </div>

                        <div class="mt-3 d-flex gap-2">
                            <a href="{% url 'edit_student' student.id %}" 
                               class="btn btn-sm btn-outline-warning w-100">
                                Изменить
                            </a>

                            <form action="{% url 'delete_student' student.id %}" method="post" class="w-100">
                                {% csrf_token %}
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger w-100"
                                        onclick="return confirm('Удалить ученика?')">
                                    Удалить
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <div class="alert alert-info">
        Список учеников пуст
    </div>
{% endif %}

{% endblock %}
