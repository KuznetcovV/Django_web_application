<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home_tab' %}">
            My Project
        </a>

        <div class="d-flex align-items-center gap-3">
            {% if request.user.is_authenticated %}
                
                <span class="text-white">
                    {{ request.user.username }}
                </span>

                <a class="btn btn-outline-light btn-sm" href="{% url 'students' %}">
                    Ученики
                </a>

                <a class="btn btn-outline-light btn-sm" href="{% url 'lessons' %}">
                    Расписание
                </a>

                <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">
                    Выйти
                </a>

            {% else %}
                <a class="btn btn-primary btn-sm" href="{% url 'login' %}">
                    Войти
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
